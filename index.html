<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube - 视频分享平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --yt-red: #ff0000;
            --yt-black: #0f0f0f;
            --yt-dark: #282828;
            --yt-light: #f9f9f9;
            --yt-border: #e5e5e5;
            --yt-text: #030303;
            --yt-text-secondary: #606060;
            --yt-hover: #f2f2f2;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: var(--yt-light);
            color: var(--yt-text);
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            border-bottom: 1px solid var(--yt-border);
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-btn {
            width: 40px; height: 40px; border: none; background: none;
            cursor: pointer; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 18px; color: var(--yt-text);
        }
        .menu-btn:hover { background: var(--yt-hover); }

        .logo {
            display: flex; align-items: center; gap: 2px;
            text-decoration: none; color: var(--yt-text);
            font-weight: 700; font-size: 20px;
        }
        .logo-icon { color: var(--yt-red); font-size: 28px; }
        .logo-text { letter-spacing: -1px; }
        .logo sup { font-size: 10px; color: var(--yt-text-secondary); font-weight: 400; margin-left: 2px; }

        .search-container {
            flex: 1; max-width: 640px; margin: 0 40px;
            display: flex; align-items: center;
        }
        .search-box {
            display: flex; flex: 1; height: 40px;
            border: 1px solid #ccc; border-radius: 20px 0 0 20px;
            overflow: hidden; background: white;
        }
        .search-box:focus-within {
            border-color: #1c62b9;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        .search-input {
            flex: 1; border: none; outline: none;
            padding: 0 16px; font-size: 16px; font-family: 'Roboto', sans-serif;
        }
        .search-btn {
            width: 64px; border: none; background: #f8f8f8;
            border-left: 1px solid #ccc; cursor: pointer;
            color: #333; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .search-btn:hover { background: #f0f0f0; }
        .voice-btn {
            width: 40px; height: 40px; border-radius: 50%;
            border: none; background: #f8f8f8; margin-left: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .voice-btn:hover { background: var(--yt-hover); }

        .header-right { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%;
            border: none; background: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--yt-text); position: relative;
        }
        .icon-btn:hover { background: var(--yt-hover); }
        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: #8e24aa; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 500; cursor: pointer; margin-left: 8px;
        }

        .sidebar {
            position: fixed; left: 0; top: 56px; bottom: 0;
            width: 240px; background: white;
            overflow-y: auto; padding: 12px 0;
            z-index: 999; transition: transform 0.3s;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        .sidebar-section { padding: 8px 0; border-bottom: 1px solid var(--yt-border); }
        .sidebar-item {
            display: flex; align-items: center;
            padding: 0 24px; height: 40px;
            cursor: pointer; color: var(--yt-text);
            text-decoration: none; font-size: 14px;
        }
        .sidebar-item:hover { background: var(--yt-hover); }
        .sidebar-item.active { background: var(--yt-hover); font-weight: 500; }
        .sidebar-item i { width: 24px; margin-right: 24px; font-size: 18px; text-align: center; }
        .sidebar-title { padding: 8px 24px; font-size: 16px; font-weight: 500; }

        .main-content {
            margin-left: 240px; margin-top: 56px;
            padding: 24px; min-height: calc(100vh - 56px);
        }
        .main-content.full { margin-left: 0; }

        .categories {
            position: sticky; top: 56px; background: white;
            padding: 12px 0; margin: -24px -24px 16px -24px;
            padding-left: 24px; display: flex; gap: 12px;
            overflow-x: auto; border-bottom: 1px solid var(--yt-border);
            z-index: 100;
        }
        .category-chip {
            padding: 6px 12px; border-radius: 8px;
            background: var(--yt-hover); border: 1px solid var(--yt-border);
            cursor: pointer; white-space: nowrap; font-size: 14px;
            transition: all 0.2s;
        }
        .category-chip:hover { background: #e5e5e5; }
        .category-chip.active { background: var(--yt-text); color: white; border-color: var(--yt-text); }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .video-card {
            cursor: pointer; transition: transform 0.2s;
            text-decoration: none; color: inherit;
        }
        .video-card:hover { transform: scale(1.02); }
        .thumbnail {
            position: relative; width: 100%; padding-top: 56.25%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px; overflow: hidden;
        }
        .thumbnail img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }
        .thumbnail .fallback-img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white; font-size: 48px; font-weight: bold;
        }
        .duration {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 2px 4px; border-radius: 4px;
            font-size: 12px; font-weight: 500;
            z-index: 2;
        }
        .video-info { display: flex; margin-top: 12px; gap: 12px; }
        .channel-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: #ff5722; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 500; font-size: 14px; flex-shrink: 0;
        }
        .video-meta { flex: 1; }
        .video-title {
            font-size: 16px; font-weight: 500; line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .video-channel { font-size: 14px; color: var(--yt-text-secondary); margin-bottom: 2px; }
        .video-stats { font-size: 14px; color: var(--yt-text-secondary); }

        .watch-page {
            display: none; margin-left: 0; margin-top: 56px;
            background: white; min-height: calc(100vh - 56px);
        }
        .watch-container {
            max-width: 1754px; margin: 0 auto;
            padding: 24px; display: grid;
            grid-template-columns: 1fr 400px; gap: 24px;
        }
        .player-section { position: relative; }
        .player-wrapper {
            position: relative; width: 100%; padding-top: 56.25%;
            background: #000; border-radius: 12px; overflow: hidden;
        }
        .player-wrapper iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; border: none;
        }
        .video-details { margin-top: 16px; }
        .watch-title { font-size: 20px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
        .watch-stats {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; border-bottom: 1px solid var(--yt-border);
        }
        .watch-views { color: var(--yt-text-secondary); font-size: 14px; }
        .watch-actions { display: flex; gap: 8px; }
        .action-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; border: none; background: var(--yt-hover);
            border-radius: 18px; cursor: pointer; font-size: 14px;
            font-weight: 500; color: var(--yt-text);
        }
        .action-btn:hover { background: #e5e5e5; }
        .action-btn i { font-size: 18px; }

        .channel-info {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid var(--yt-border);
        }
        .channel-left { display: flex; align-items: center; gap: 12px; }
        .channel-avatar-large {
            width: 48px; height: 48px; border-radius: 50%;
            background: #ff5722; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 500; font-size: 20px;
        }
        .channel-meta h3 { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .channel-meta p { font-size: 12px; color: var(--yt-text-secondary); }
        .subscribe-btn {
            padding: 10px 16px; background: var(--yt-text); color: white;
            border: none; border-radius: 18px; font-size: 14px;
            font-weight: 500; cursor: pointer; text-transform: uppercase;
        }
        .subscribe-btn:hover { background: var(--yt-dark); }
        .description {
            margin-top: 12px; padding: 12px; background: var(--yt-hover);
            border-radius: 12px; font-size: 14px; line-height: 1.6;
            white-space: pre-wrap;
        }

        .related-videos { display: flex; flex-direction: column; gap: 8px; }
        .related-header { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .related-card {
            display: flex; gap: 8px; cursor: pointer;
            padding: 8px; border-radius: 8px;
        }
        .related-card:hover { background: var(--yt-hover); }
        .related-thumb {
            width: 168px; height: 94px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 8px; overflow: hidden; flex-shrink: 0; position: relative;
        }
        .related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .related-thumb .fallback-img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white; font-size: 24px; font-weight: bold;
        }
        .related-info { flex: 1; }
        .related-title {
            font-size: 14px; font-weight: 500; line-height: 1.3;
            margin-bottom: 4px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .related-channel { font-size: 12px; color: var(--yt-text-secondary); margin-bottom: 2px; }
        .related-stats { font-size: 12px; color: var(--yt-text-secondary); }

        .search-page {
            display: none; margin-left: 240px; margin-top: 56px;
            padding: 24px; min-height: calc(100vh - 56px);
        }
        .search-page.full { margin-left: 0; }
        .search-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px;
        }
        .search-header h2 { font-size: 20px; font-weight: 400; }
        .search-header span { color: var(--yt-text-secondary); font-size: 14px; }

        .search-filters {
            display: flex; gap: 16px; padding-bottom: 16px;
            border-bottom: 1px solid var(--yt-border); margin-bottom: 16px;
        }
        .filter-btn {
            padding: 8px 16px; border: none; background: none;
            cursor: pointer; font-size: 14px;
            color: var(--yt-text-secondary); font-weight: 500;
        }
        .filter-btn.active { color: var(--yt-text); border-bottom: 2px solid var(--yt-text); }

        .search-results { display: flex; flex-direction: column; gap: 16px; }
        .result-card {
            display: flex; gap: 16px; cursor: pointer;
        }
        .result-card:hover .result-thumb { border-radius: 0; }
        .result-thumb {
            width: 360px; height: 202px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px; overflow: hidden; flex-shrink: 0;
            transition: border-radius 0.2s; position: relative;
        }
        .result-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .result-thumb .fallback-img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white; font-size: 48px; font-weight: bold;
        }
        .result-info { flex: 1; padding-top: 4px; }
        .result-title { font-size: 18px; font-weight: 400; margin-bottom: 4px; }
        .result-meta { font-size: 12px; color: var(--yt-text-secondary); margin-bottom: 8px; }
        .result-desc {
            font-size: 12px; color: var(--yt-text-secondary);
            line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .loading {
            display: flex; justify-content: center; align-items: center;
            padding: 40px; color: var(--yt-text-secondary);
        }
        .loading i { font-size: 24px; margin-right: 8px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; margin-bottom: 16px;
            border: none; background: var(--yt-hover);
            border-radius: 18px; cursor: pointer;
            font-size: 14px; font-weight: 500;
        }
        .back-btn:hover { background: #e5e5e5; }

        .api-status {
            position: fixed; bottom: 16px; right: 16px;
            padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
            z-index: 1001; display: none;
        }
        .api-status.online { background: #e8f5e9; color: #2e7d32; display: block; }
        .api-status.offline { background: #fff3e0; color: #e65100; display: block; }

        @media (max-width: 1200px) {
            .watch-container { grid-template-columns: 1fr; }
            .related-videos { display: none; }
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content, .search-page { margin-left: 0; }
            .video-grid { grid-template-columns: 1fr; }
            .search-container { margin: 0 8px; }
            .result-thumb { width: 160px; height: 90px; }
            .result-title { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="api-status" id="apiStatus"></div>

    <header class="header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>

    <main class="main-content" id="homePage">
        <div class="categories">
            <div class="category-chip active" onclick="filterCategory('all', this)">全部</div>

                <div class="video-details">

        // ==================== 工具函数 ====================
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 100000000) return (num / 100000000).toFixed(1) + '亿';
            if (num >= 10000) return (num / 10000).toFixed(1) + '万';
            return num.toString();
        }

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            if (mins >= 60) {
                const hours = Math.floor(mins / 60);
                const remainMins = mins % 60;
                return `${hours}:${remainMins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '未知';
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = (now - date) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + '天前';
            if (diff < 2592000) return Math.floor(diff / 604800) + '周前';
            if (diff < 31536000) return Math.floor(diff / 2592000) + '个月前';
            return Math.floor(diff / 31536000) + '年前';
        }

        function showApiStatus(online, msg) {
            const el = document.getElementById('apiStatus');
            el.className = 'api-status ' + (online ? 'online' : 'offline');
            el.textContent = msg;
            setTimeout(() => { el.style.display = 'none'; }, 3000);
            el.style.display = 'block';
        }

        // ==================== 缩略图处理 ====================
        function getThumbnailUrl(bvid, width, height) {
            // 使用 picsum.photos 作为可靠的占位图服务
            // seed 使用 bvid 保证同一视频总是相同图片
            return `https://picsum.photos/seed/${bvid}/${width}/${height}`;
        }

        function handleImageError(img, fallbackText) {
            img.style.display = 'none';
            const fallback = img.nextElementSibling;
            if (fallback && fallback.classList.contains('fallback-img')) {
                fallback.style.display = 'flex';
                fallback.textContent = fallbackText;
            }
        }

        // ==================== 视频卡片渲染 ====================
        function createVideoCard(video) {
            const avatar = video.author ? video.author.charAt(0) : 'U';
            const views = formatNumber(video.play || 0);
            const time = video.pubdate ? formatTime(video.pubdate) : '未知';
            const duration = video.duration ? formatDuration(video.duration) : '0:00';
            const bvid = video.bvid || '';
            const pic = video.pic || getThumbnailUrl(bvid, 320, 180);

            return `
                <div class="video-card" onclick='playVideo("${bvid}", ${JSON.stringify(video).replace(/'/g, "&apos;")})'>
                    <div class="thumbnail">
                        <img src="${pic}" alt="${video.title}" loading="lazy" 
                             onerror="handleImageError(this, '${avatar}')">
                        <div class="fallback-img">${avatar}</div>
                        <span class="duration">${duration}</span>
                    </div>
                    <div class="video-info">
                        <div class="channel-avatar">${avatar}</div>
                        <div class="video-meta">
                            <div class="video-title">${video.title}</div>
                            <div class="video-channel">${video.author || '未知UP主'}</div>
                            <div class="video-stats">${views}次观看 • ${time}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function createSearchResultCard(video) {
            const views = formatNumber(video.play || 0);
            const time = video.pubdate ? formatTime(video.pubdate) : '未知';
            const duration = video.duration ? formatDuration(video.duration) : '0:00';
            const bvid = video.bvid || '';
            const pic = video.pic || getThumbnailUrl(bvid, 360, 202);
            const desc = video.description || '暂无描述';
            const avatar = video.author ? video.author.charAt(0) : 'U';

            return `
                <div class="result-card" onclick='playVideo("${bvid}", ${JSON.stringify(video).replace(/'/g, "&apos;")})'>
                    <div class="result-thumb">
                        <img src="${pic}" alt="${video.title}" loading="lazy"
                             onerror="handleImageError(this, '${avatar}')">
                        <div class="fallback-img">${avatar}</div>
                        <span class="duration">${duration}</span>
                    </div>
                    <div class="result-info">
                        <div class="result-title">${video.title}</div>
                        <div class="result-meta">${views}次观看 • ${time}</div>
                        <div class="result-desc">${video.author || '未知UP主'} • ${desc.substring(0, 120)}...</div>
                    </div>
                </div>
            `;
        }

        // ==================== 在线搜索（尝试多个CORS代理） ====================
        async function searchOnline(keyword) {
            // 代理列表
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent('https://api.bilibili.com/x/web-interface/search/type?search_type=video&keyword=' + keyword)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent('https://api.bilibili.com/x/web-interface/search/type?search_type=video&keyword=' + keyword)}`
            ];

            for (let url of proxies) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000);
                    
                    const response = await fetch(url, {
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' }
                    });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        const data = await response.json();
                        if (data.code === 0 && data.data?.result) {
                            return {
                                success: true,
                                videos: data.data.result.map(item => ({
                                    bvid: item.bvid,
                                    title: item.title?.replace(/<[^>]+>/g, '') || '',
                                    author: item.author,
                                    pic: item.pic?.startsWith('//') ? 'https:' + item.pic : item.pic,
                                    play: item.play,
                                    duration: item.duration,
                                    pubdate: item.pubdate,
                                    description: item.description
                                }))
                            };
                        }
                    }
                } catch (e) {
                    console.warn('代理失败:', url, e.message);
                    continue;
                }
            }

            return { success: false, videos: [] };
        }

        // ==================== 搜索功能（在线优先，离线兜底） ====================
        async function performSearch() {
            let query = document.getElementById('searchInput').value.trim();
            if (!query) query = '热门';

            document.getElementById('homePage').style.display = 'none';
            document.getElementById('watchPage').style.display = 'none';
            document.getElementById('searchPage').style.display = 'block';
            document.getElementById('searchQuery').textContent = `"${query}"`;

            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> 正在搜索B站视频...</div>';

            // 1. 尝试在线搜索
            const onlineResult = await searchOnline(query);

            if (onlineResult.success && onlineResult.videos.length > 0) {
                showApiStatus(true, '已连接B站搜索');
                resultsContainer.innerHTML = onlineResult.videos.map(v => createSearchResultCard(v)).join('');
                localStorage.setItem('lastSearchResults', JSON.stringify(onlineResult.videos));
                return;
            }

            // 2. 在线失败 -> 使用本地真实数据（但告诉用户是离线模式）
            console.log('在线搜索失败，切换到离线模式');
            showApiStatus(false, '离线模式 - 显示缓存数据');

            // 从本地数据中筛选匹配项
            const lowerQuery = query.toLowerCase();
            let filtered = realBilibiliData.filter(v => {
                return v.title.toLowerCase().includes(lowerQuery) ||
                       v.author.toLowerCase().includes(lowerQuery) ||
                       v.description.toLowerCase().includes(lowerQuery);
            });

            // 如果筛选结果太少，显示全部本地数据
            if (filtered.length < 3) {
                filtered = realBilibiliData;
            }

            resultsContainer.innerHTML = filtered.map(v => createSearchResultCard(v)).join('');
            localStorage.setItem('lastSearchResults', JSON.stringify(filtered));
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') performSearch();
        }

        // ==================== 分类筛选 ====================
        async function filterCategory(category, element) {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            const grid = document.getElementById('videoGrid');
            
            if (category === 'all') {
                initHome();
                return;
            }

            grid.innerHTML = '<div class="loading" style="grid-column:1/-1;"><i class="fas fa-spinner"></i> 加载中...</div>';

            const result = await searchOnline(category);

            if (result.success && result.videos.length > 0) {
                grid.innerHTML = result.videos.slice(0, 12).map(v => createVideoCard(v)).join('');
                localStorage.setItem('lastSearchResults', JSON.stringify(result.videos));
                return;
            }

            // 离线模式
            showApiStatus(false, '离线模式');
            const filtered = realBilibiliData.filter(v => 
                v.title.includes(category) || v.description.includes(category)
            );
            grid.innerHTML = (filtered.length > 0 ? filtered : realBilibiliData).map(v => createVideoCard(v)).join('');
        }

        // ==================== 播放视频 ====================
        function playVideo(bvid, video) {
            if (typeof video === 'string') {
                try { video = JSON.parse(video); } catch(e) { video = null; }
            }
            
            if (!video) {
                const cached = localStorage.getItem('lastSearchResults');
                if (cached) {
                    const videos = JSON.parse(cached);
                    video = videos.find(v => v.bvid === bvid);
                }
            }
            
            if (!video) {
                video = realBilibiliData.find(v => v.bvid === bvid);
            }

            if (!video || !video.bvid) {
                alert('视频信息加载失败');
                return;
            }

            document.getElementById('homePage').style.display = 'none';
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('watchPage').style.display = 'block';

            const player = document.getElementById('bilibiliPlayer');
            player.src = `https://player.bilibili.com/player.html?bvid=${bvid}&page=1&as_wide=1&high_quality=1&danmaku=0&autoplay=1`;

            document.getElementById('watchTitle').textContent = video.title || '未知标题';
            document.getElementById('watchViews').textContent = 
                `${formatNumber(video.play || 0)}次观看 • ${video.pubdate ? formatTime(video.pubdate) : '未知时间'}`;
            document.getElementById('likeCount').textContent = formatNumber(video.like || Math.floor((video.play || 0) * 0.05));
            document.getElementById('channelName').textContent = video.author || '未知UP主';
            document.getElementById('channelAvatar').textContent = (video.author || 'U').charAt(0);
            document.getElementById('subCount').textContent = '订阅者';
            document.getElementById('videoDesc').textContent = video.description || '暂无描述';

            // 加载相关推荐
            let related = [];
            const cached = localStorage.getItem('lastSearchResults');
            if (cached) {
                const all = JSON.parse(cached);
                related = all.filter(v => v.bvid !== bvid).slice(0, 6);
            }
            if (related.length === 0) {
                related = realBilibiliData.filter(v => v.bvid !== bvid).slice(0, 6);
            }

            document.getElementById('relatedList').innerHTML = related.map(v => {
                const pic = v.pic || getThumbnailUrl(v.bvid, 168, 94);
                const views = formatNumber(v.play || 0);
                const avatar = v.author ? v.author.charAt(0) : 'U';
                return `
                    <div class="related-card" onclick='playVideo("${v.bvid}", ${JSON.stringify(v).replace(/'/g, "&apos;")})'>
                        <div class="related-thumb">
                            <img src="${pic}" alt="${v.title}" 
                                 onerror="handleImageError(this, '${avatar}')">
                            <div class="fallback-img">${avatar}</div>
                            <span class="duration">${v.duration ? formatDuration(v.duration) : '0:00'}</span>
                        </div>
                        <div class="related-info">
                            <div class="related-title">${v.title}</div>
                            <div class="related-channel">${v.author || '未知UP主'}</div>
                            <div class="related-stats">${views}次观看</div>
                        </div>
                    </div>
                `;
            }).join('');

            window.scrollTo(0, 0);
        }

        // ==================== 页面导航 ====================
        function goHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('watchPage').style.display = 'none';
            document.getElementById('bilibiliPlayer').src = '';
            window.scrollTo(0, 0);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.querySelectorAll('.main-content, .search-page').forEach(el => el.classList.toggle('full'));
        }

        // ==================== 初始化首页 ====================
        async function initHome() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<div class="loading" style="grid-column:1/-1;"><i class="fas fa-spinner"></i> 正在加载...</div>';

            const result = await searchOnline('热门');

            if (result.success && result.videos.length > 0) {
                grid.innerHTML = result.videos.slice(0, 12).map(v => createVideoCard(v)).join('');
                localStorage.setItem('lastSearchResults', JSON.stringify(result.videos));
                showApiStatus(true, '已连接B站');
                return;
            }

            // 离线模式显示本地数据
            showApiStatus(false, '离线模式 - 显示热门缓存');
            grid.innerHTML = realBilibiliData.map(v => createVideoCard(v)).join('');
        }

        // ==================== 启动 ====================
        initHome();
    </script>
